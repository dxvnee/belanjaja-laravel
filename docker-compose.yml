services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: belanjaja-app
    ports:
      - "8000:80"
      - "5173:5173"
    volumes:
      - .:/var/www/html
    networks:
      - belanjaja-network
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: belanjaja_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - belanjaja-network

networks:
  belanjaja-network:
    driver: bridge

volumes:
  pgdata:
